# Cache headers workflow
name: Add Cache Headers

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create _headers file
        run: |
          echo "# Cache headers" > _headers
          echo "*.webp" >> _headers
          echo "  Cache-Control: public, max-age=31536000, immutable" >> _headers
          echo "*.jpg" >> _headers
          echo "  Cache-Control: public, max-age=31536000, immutable" >> _headers
          echo "*.png" >> _headers
          echo "  Cache-Control: public, max-age=31536000, immutable" >> _headers
          echo "*.css" >> _headers
          echo "  Cache-Control: public, max-age=86400, immutable" >> _headers
          echo "*.js" >> _headers
          echo "  Cache-Control: public, max-age=86400, immutable" >> _headers
          echo "*.html" >> _headers
          echo "  Cache-Control: public, max-age=0, must-revalidate" >> _headers

      - name: Copy _headers to docs
        run: |
          cp _headers docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
